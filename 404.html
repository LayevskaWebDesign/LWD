<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página no encontrada · Layevska Web Design</title>
<meta name="description" content="La página que buscás se perdió en el cuarto oscuro. Volvé al inicio o escribinos por WhatsApp." />
<meta name="robots" content="noindex, follow" />
<meta name="theme-color" content="#14233F" />

<link rel="icon" type="image/svg+xml" href="favicon.svg" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>

<style>
:root{
  --bg:#14233F;
  --bg-deep:#0E1A2F;
  --bg-light:#25344F;
  --gold:#C9A961;
  --gold-bright:#DDC289;
  --honey:#E5B450;
  --pink:#C9A0A0;
  --ivory:#EFE9DD;
  --text:#EFE9DD;
  --text-soft:rgba(239,233,221,0.82);
  --text-dim:rgba(239,233,221,0.55);
  --line:rgba(239,233,221,0.13);
  --line-strong:rgba(239,233,221,0.28);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 80% 20%, rgba(229,180,80,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 20% 80%, rgba(201,160,160,0.18) 0%, transparent 50%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-weight:400;line-height:1.65;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
  position:relative;
}
.scene-3d{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity 1.4s ease;
}
.scene-3d.ready{opacity:0.7}
.scene-3d canvas{display:block;width:100%!important;height:100%!important}
.wrap{
  max-width:680px;padding:60px 32px;text-align:center;
  position:relative;z-index:2;
}
.brand{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;font-weight:600;color:var(--text);
  margin-bottom:48px;letter-spacing:-0.01em;
}
.brand em{color:var(--gold);font-style:normal}
.code{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;letter-spacing:0.25em;
  color:var(--gold-bright);text-transform:uppercase;
  margin-bottom:20px;
}
.code::before{
  content:"";display:inline-block;width:32px;height:1px;
  background:var(--gold);margin-right:14px;vertical-align:middle;
}
h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(56px, 12vw, 120px);font-weight:600;
  line-height:0.95;letter-spacing:-0.04em;
  margin-bottom:24px;color:var(--text);
}
h1 em{
  color:var(--gold-bright);font-style:italic;
  position:relative;display:inline-block;
}
.lead{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:24px;
  color:var(--text-soft);font-weight:400;
  margin-bottom:48px;line-height:1.4;
}
.actions{
  display:flex;gap:16px;justify-content:center;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:18px 32px;
  font-family:'Inter',sans-serif;font-size:13px;
  letter-spacing:0.20em;text-transform:uppercase;
  font-weight:500;text-decoration:none;
  border:1px solid transparent;border-radius:2px;
  transition:all .35s cubic-bezier(.2,.8,.2,1);
  cursor:pointer;
}
.btn-primary{background:var(--gold);color:var(--bg-deep);}
.btn-primary:hover{background:var(--gold-bright);transform:translateY(-3px);box-shadow:0 16px 32px -10px var(--gold)}
.btn-outline{color:var(--text);border-color:var(--text);background:transparent}
.btn-outline:hover{background:var(--text);color:var(--bg)}
.foot{
  margin-top:60px;font-size:11px;
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.15em;color:var(--text-dim);
  text-transform:uppercase;
}
.foot a{color:var(--gold-bright);text-decoration:none}
.foot a:hover{text-decoration:underline}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{opacity:0;animation:fadeUp .8s ease forwards}
.fade-in.d1{animation-delay:.1s}
.fade-in.d2{animation-delay:.3s}
.fade-in.d3{animation-delay:.5s}
.fade-in.d4{animation-delay:.7s}
.fade-in.d5{animation-delay:.9s}
</style>
</head>
<body>

<div class="scene-3d" id="scene3d" aria-hidden="true"></div>

<main class="wrap">
  <div class="brand fade-in d1">Layevsk<em>a</em>.</div>
  <div class="code fade-in d2">Error 404 · Página perdida</div>
  <h1 class="fade-in d3">Esta <em>toma</em> no salió.</h1>
  <p class="lead fade-in d4">El cuadro que buscás no está en el set. Capaz lo borramos en la última edición, o el link te llevó al cuarto oscuro equivocado.</p>
  <div class="actions fade-in d5">
    <a href="/" class="btn btn-primary">← Volver al inicio</a>
    <a href="https://wa.me/50687518441?text=Hola,%20me%20encontré%20con%20la%20página%20404%20y%20quería%20preguntarles%20por%20sus%20landings." target="_blank" rel="noopener" class="btn btn-outline">Hablar por WhatsApp</a>
  </div>
  <p class="foot fade-in d5">Layevska Web Design  ·  <a href="tel:+50687518441">+506 8751-8441</a>  ·  San José, Costa Rica</p>
</main>

<script>
(function(){
  function whenReady(cb){
    if(window.THREE) return cb();
    var tries=0;var iv=setInterval(function(){tries++;if(window.THREE){clearInterval(iv);cb();}else if(tries>80){clearInterval(iv);}},80);
  }
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) return;
  whenReady(function(){
    var THREE = window.THREE;
    var container = document.getElementById('scene3d');
    var scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0E1A2F, 0.04);
    var camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 10);
    var renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 1.6));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    var key = new THREE.DirectionalLight(0xDDC289, 1.3);
    key.position.set(3,4,5); scene.add(key);
    var rim = new THREE.PointLight(0xC9A0A0, 0.6, 18);
    rim.position.set(-4,-2,3); scene.add(rim);

    // Película rota (claqueta + tira de cuadros) — sigue el tema cinemático
    var COLORS = {gold:0xC9A961, goldBright:0xDDC289, navy:0x14233F, ivory:0xEFE9DD, pink:0xC9A0A0, honey:0xE5B450};
    var shapes = [];
    // 8 cuadros de película que "caen" como rota
    for(var i=0;i<8;i++){
      var fr = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.85, 0.06),
        new THREE.MeshStandardMaterial({color:COLORS.navy, metalness:0.6, roughness:0.3, emissive:COLORS.navy, emissiveIntensity:0.3})
      );
      fr.position.set(-4 + i*1.1, Math.random()*4-2, Math.random()*2-1);
      fr.userData = {basePos: fr.position.clone(), speed:0.3+Math.random()*0.5, off:Math.random()*6};
      scene.add(fr);
      shapes.push(fr);
    }
    // 4 prismas dorados decorativos
    for(var p=0;p<4;p++){
      var prism = new THREE.Mesh(
        new THREE.ConeGeometry(0.35, 1.2, 3),
        new THREE.MeshStandardMaterial({color:p%2===0?COLORS.gold:COLORS.honey, metalness:0.85, roughness:0.18, emissive:p%2===0?COLORS.gold:COLORS.honey, emissiveIntensity:0.35, transparent:true, opacity:0.85})
      );
      prism.position.set((Math.random()-0.5)*8, (Math.random()-0.5)*6, -2-Math.random()*2);
      prism.userData = {speed:0.4+Math.random()*0.4, off:Math.random()*6};
      scene.add(prism);
      shapes.push(prism);
    }
    // Partículas
    var pcount = 200;
    var pg = new THREE.BufferGeometry();
    var pp = new Float32Array(pcount*3); var pc = new Float32Array(pcount*3);
    var cGold = new THREE.Color(COLORS.gold), cIvory = new THREE.Color(COLORS.ivory), cPink = new THREE.Color(COLORS.pink);
    for(var i=0;i<pcount;i++){
      pp[i*3]=(Math.random()-0.5)*16; pp[i*3+1]=(Math.random()-0.5)*12; pp[i*3+2]=(Math.random()-0.5)*8;
      var c = Math.random()<0.5?cGold:(Math.random()<0.7?cIvory:cPink);
      pc[i*3]=c.r; pc[i*3+1]=c.g; pc[i*3+2]=c.b;
    }
    pg.setAttribute('position', new THREE.BufferAttribute(pp,3));
    pg.setAttribute('color', new THREE.BufferAttribute(pc,3));
    var particles = new THREE.Points(pg, new THREE.PointsMaterial({size:0.05, vertexColors:true, transparent:true, opacity:0.85, depthWrite:false, blending:THREE.AdditiveBlending, sizeAttenuation:true}));
    scene.add(particles);

    window.addEventListener('resize', function(){
      camera.aspect = window.innerWidth/window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    var t0 = performance.now();
    var mx=0, my=0;
    window.addEventListener('mousemove', function(e){
      mx = (e.clientX/window.innerWidth - 0.5);
      my = (e.clientY/window.innerHeight - 0.5);
    });
    function animate(){
      var t = (performance.now()-t0)*0.001;
      camera.position.x += (mx*0.8 - camera.position.x)*0.04;
      camera.position.y += (-my*0.5 - camera.position.y)*0.04;
      camera.lookAt(0,0,0);
      shapes.forEach(function(s, i){
        s.rotation.x = t*s.userData.speed;
        s.rotation.y = t*s.userData.speed*1.2;
        s.position.y = (s.userData.basePos ? s.userData.basePos.y : s.position.y) + Math.sin(t*0.6+s.userData.off)*0.3;
      });
      var pos = particles.geometry.attributes.position.array;
      for(var i=0;i<pos.length;i+=3){pos[i+1]+=0.004; if(pos[i+1]>6) pos[i+1]=-6;}
      particles.geometry.attributes.position.needsUpdate = true;
      particles.rotation.y = t*0.04;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
    setTimeout(function(){container.classList.add('ready');}, 100);
  });
})();
</script>
</body>
</html>
