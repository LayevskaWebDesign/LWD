# RODMA Super Pro · configuración de Netlify (deploy)
[build]
  command = "pnpm build"
  publish = "dist"

# SPA: todas las rutas sirven index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Cabeceras de seguridad (verificar luego en securityheaders.com)
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
